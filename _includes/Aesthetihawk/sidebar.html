<style>
    .profile-pic {
        border-radius: 50%;
        height: 125px;
        width: 125px;
        object-fit: cover;
        border: 2px solid #ccc;
        cursor: pointer;
        transition: filter 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-pic:hover {
        filter: brightness(1.1);
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.4);
    }

    .pfpButton {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 125px;
        width: 125px;
    }

    /* SIDEBAR LINK STYLES */
    .sidebar ul {
        display: flex;
        flex-direction: column;
        align-items: start;
        list-style-type: none;
        padding-left: 0px;
    }

    .sidebar ul li a {
        position: relative;
        display: block;
        padding: 4px 0;
        font-family: Lato, sans-serif;
        color: #ecf0f1;
        text-decoration: none;
        transition: 0.5s;
        font-weight: bolder;
    }

    .sidebar ul li a::after {
        position: absolute;
        content: "";
        top: 100%;
        left: 0;
        width: 100%;
        height: 3px;
        background: #3498db;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform 0.5s;
    }

    .sidebar ul li a:hover {
        color: #95a5a6;
    }

    .sidebar ul li a:hover::after {
        transform: scaleX(1);
        transform-origin: left;
    }

    .sidebar .active-tab {
        color: #0071e3;
    }
</style>

<div class="pfpButton" onclick="openChangePfpModal()">
    <img src="{{site.baseurl}}/images/default-avatar.png" alt="Profile Picture" class="profile-pic" id="headerPfp">
</div>
<h1 id="headerName">Welcome,<br /> User</h1>

<!-- nav links -->
<ul>
    <li id="profile-link"><h3><a href="{{site.baseurl}}/profile" id="profile-link_">Profile Settings</a></h3></li>
    <li id="student-toolkit-link"><h3><a href="{{site.baseurl}}/student" id="student-toolkit-link_">Student Toolkit</a></h3></li>
    <li id="teacher-toolkit-link"><h3><a href="#">Teacher Toolkit</a></h3></li>
    <li id="calendar-link"><h3><a href="{{site.baseurl}}/student/calendar">Calendar</a></h3></li>
    <li id="sign-out-link"><h3><a href="{{site.baseurl}}/logoutjava">Sign Out</a></h3></li>
    <li id="sign-in-link"><h3><a href="{{site.baseurl}}/toolkit-login">Sign In</a></h3></li>
    <li id="sign-up-link"><h3><a href="{{site.baseurl}}/signup">Sign Up</a></h3></li>
</ul>

<script type="module">
    import { javaURI, fetchOptions } from '{{site.baseurl}}/assets/js/api/config.js';

    document.addEventListener('DOMContentLoaded', function () {
        const activeTab = localStorage.getItem('activeTab');
        if (activeTab) setActiveTab(activeTab);

        getCredentialsJava()
            .then(data => {
                const profileLink = document.getElementById('profile-link');
                const studentToolkitLink = document.getElementById('student-toolkit-link');
                const teacherToolkitLink = document.getElementById('teacher-toolkit-link');
                const calendarLink = document.getElementById('calendar-link');
                const signOutLink = document.getElementById('sign-out-link');
                const signInLink = document.getElementById('sign-in-link');
                const signUpLink = document.getElementById('sign-up-link');

                const name = document.getElementById('headerName');
                const pfp = document.getElementById('headerPfp');

                if (data) {
                    signInLink.style.display = 'none';
                    signUpLink.style.display = 'none';
                    profileLink.style.display = 'block';
                    studentToolkitLink.style.display = 'block';
                    calendarLink.style.display = 'block';

                    const isTeacher = data.roles.some(role => role.name === 'ROLE_TEACHER');
                    teacherToolkitLink.style.display = isTeacher ? 'block' : 'none';
                    signOutLink.style.display = 'block';
                    name.innerHTML = "Welcome, <br/>" + data.name;

                    const fallbackSrc = "{{site.baseurl}}/images/default-avatar.png";
                    const githubPfpUrl = `https://github.com/${data.uid}.png`;

                    const imgTest = new Image();
                    imgTest.onload = () => pfp.src = githubPfpUrl;
                    imgTest.onerror = () => {
                        console.warn("GitHub PFP failed to load, using fallback.");
                        pfp.src = fallbackSrc;
                    };
                    imgTest.src = githubPfpUrl;

                    if (data.pfp && typeof data.pfp === "string" && data.pfp.trim() !== "") {
                        let candidateSrc = "";
                        if (isBase64(data.pfp)) {
                            candidateSrc = data.pfp.startsWith('data:image/')
                                ? data.pfp
                                : 'data:image/png;base64,' + data.pfp;
                        } else {
                            candidateSrc = javaURI + data.pfp;
                        }

                        const imgTest = new Image();
                        imgTest.onload = () => pfp.src = candidateSrc;
                        imgTest.onerror = () => {
                            console.warn("Profile image failed to load, using fallback.");
                            pfp.src = fallbackSrc;
                        };
                        imgTest.src = candidateSrc;
                    }

                } else {
                    signInLink.style.display = 'block';
                    signUpLink.style.display = 'block';
                    profileLink.style.display = 'none';
                    studentToolkitLink.style.display = 'none';
                    teacherToolkitLink.style.display = 'none';
                    calendarLink.style.display = 'none';
                    signOutLink.style.display = 'none';
                }
            })
            .catch(err => console.error("Error fetching credentials: ", err));

        document.querySelectorAll("ul li a").forEach(link => {
            link.addEventListener("click", function () {
                const tabId = this.id.replace("-link_", "");
                setActiveTab(tabId);
            });
        });
    });

    function getCredentialsJava() {
        const URL = javaURI + '/api/person/get';
        return fetch(URL, fetchOptions)
            .then(response => {
                if (response.status !== 200) {
                    console.error("HTTP status code: " + response.status);
                    return null;
                }
                return response.json();
            })
            .catch(err => {
                console.error("Fetch error: ", err);
                return null;
            });
    }

    function isBase64(str) {
        return /^([A-Za-z0-9+/]{4})*([A-Za-z0-9+/]{3}=|[A-Za-z0-9+/]{2}==)?$/.test(str);
    }

    function setActiveTab(tab) {
        document.querySelectorAll("ul li a").forEach(link => link.classList.remove("active-tab"));
        const activeLink = document.getElementById(tab + "-link_");
        if (activeLink) {
            activeLink.classList.add("active-tab");
            localStorage.setItem('activeTab', tab);
        }
    }
</script>
